name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # release-please reads Conventional Commits on main and maintains a Release
  # PR that bumps package.json + CHANGELOG.md. Merging that PR cuts the git tag
  # + GitHub Release, sets release_created, and triggers the gated jobs below.
  # Everything stays in THIS workflow (no tag-triggered second workflow), so a
  # GITHUB_TOKEN-created tag never needs a PAT to fan out. bump-minor-pre-major
  # (config) keeps a pre-1.0 breaking change at minor, not 1.0.0.
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      version: ${{ steps.rp.outputs.version }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      sha: ${{ steps.rp.outputs.sha }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  test:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    # Reusable test.yml declares `contents: read`; a caller granting less (the
    # top-level `{}`) makes the call an illegal permission elevation → the whole
    # workflow startup-fails. Grant the called workflow's declared maximum here.
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  build:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: universe-darwin-arm64
          - os: macos-15-intel
            artifact: universe-darwin-amd64
          - os: ubuntu-latest
            artifact: universe-linux-amd64
          - os: ubuntu-24.04-arm
            artifact: universe-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          # Build the exact commit release-please tagged, not branch HEAD, so
          # the binaries match the published tag + GitHub Release.
          ref: ${{ needs.release-please.outputs.sha }}
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsdown
      - name: Generate SEA blob
        run: node --experimental-sea-config sea-config.json
      - name: Create executable
        run: cp "$(which node)" "${{ matrix.artifact }}"
      - name: Remove existing signature (macOS)
        if: runner.os == 'macOS'
        run: codesign --remove-signature "${{ matrix.artifact }}"
      - name: Inject SEA blob
        run: pnpm exec postject ${{ matrix.artifact }} NODE_SEA_BLOB dist/sea.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 --macho-segment-name NODE_SEA
      - name: Sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --sign - --entitlements entitlements.plist "${{ matrix.artifact }}"
      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # npm publish stays INLINE here with id-token: write. The npm Trusted
  # Publisher binding matches on org + repo + this workflow's filename
  # (release.yml) + environment — moving publish into a reusable/workflow_call
  # would flip the OIDC subject to the caller and break the binding.
  publish:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: ${{ needs.release-please.outputs.sha }}
      - uses: ./.github/actions/validate-version
        with:
          version: ${{ needs.release-please.outputs.version }}
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsdown
      # package.json is already at the release version (release-please bumped it
      # on the tagged commit). Stable-only: dist-tag is always `latest`.
      # --provenance is implicit under Trusted Publishing; kept explicit.
      - run: npm publish --provenance --access public --tag latest

  upload:
    needs: [release-please, build, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          merge-multiple: true
      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            universe-darwin-arm64 universe-darwin-arm64.sha256 \
            universe-darwin-amd64 universe-darwin-amd64.sha256 \
            universe-linux-amd64 universe-linux-amd64.sha256 \
            universe-linux-arm64 universe-linux-arm64.sha256 \
            --repo "${{ github.repository }}"
