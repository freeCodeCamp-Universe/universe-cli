name: Check version consistency
description: Validate that inputs.version matches package.json version and CHANGELOG.md heading
inputs:
  version:
    description: The release version (must be semver)
    required: true

runs:
  using: composite
  steps:
    - name: Validate semver
      uses: ./.github/actions/validate-version
      with:
        version: ${{ inputs.version }}
    - name: Check package.json version matches
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$PKG_VERSION" != "$VERSION" ]; then
          echo "::error::package.json version ($PKG_VERSION) does not match input version ($VERSION). Bump package.json before running the release workflow."
          exit 1
        fi
    - name: Check CHANGELOG.md section exists
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        SECTION=$(awk -v version="$VERSION" '
          $0 == "## [" version "]" || index($0, "## [" version "]") == 1 { flag=1; next }
          /^## \[/ { flag=0 }
          flag
        ' CHANGELOG.md)
        if [ -z "$SECTION" ]; then
          echo "::error::No CHANGELOG.md section found for ## [$VERSION]. Add one before running the release workflow."
          exit 1
        fi
